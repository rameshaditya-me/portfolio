{{ define "main" }}
  <article class="page list">
    <header class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
    </header>
    <div class="page-content">{{ .Content }}</div>
    {{ range .Pages }}
      <section>
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        {{ .Summary }}
      </section>
    {{ end }}
  </article>
{{ end }}
