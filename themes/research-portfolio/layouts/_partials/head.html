<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Params.name }} — {{ site.Params.tagline }}{{ else }}{{ .Title }} | {{ site.Params.name }}{{ end }}</title>
{{ with .Summary }}{{ else }}{{ with .Description }}<meta name="description" content="{{ . }}">{{ end }}{{ end }}
{{ template "_internal/opengraph.html" . }}
{{ template "_internal/twitter_cards.html" . }}
<link rel="canonical" href="{{ .Permalink }}">

{{ partial "head/css.html" . }}
{{ partial "head/js.html" . }}

{{ if or .Params.math .Site.Params.math }}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hd1Yr3mmo657sG7+nhYBFBIG0L0pWq6Ut8hPAqG1" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
{{ end }}
