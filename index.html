              fonts: ["Gyre-Pagella"],
              imageFont: null,
              undefinedFamily: "'Arial Unicode MS', cmbright"
            },
            tex2jax: {
                inlineMath: [ ['$','$'], ["\\(","\\)"] ],

          });

<body>
    <div class="container blog" id="first-content" style="background-color: #E0E4E6;">
        <div class="blog-title no-cover">
            <div class="blog-intro">
                <div>
                    <h1 class="title">Your Name</h1>
                    <p class="author">Your Affiliation</p>
                    <p class="abstract">
                        Add a short bio or project summary here.
                    </p>
                    <div class="info">
                        <div>
                            <a href="#" class="button icon" style="background-color: rgba(255, 255, 255, 0.2)">Paper <i class="fa-regular fa-file-lines"></i></a>
                            &nbsp;&nbsp;
                            <a href="#" class="button icon" style="background-color: rgba(255, 255, 255, 0.2)">Code <i class="fa-solid fa-code"></i></a>
                        </div>
                    </div>
                </div>
                <div class="info">
                    <p>Venue / Year</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container blog main first" id="blog-main">
        <h1>Introduction</h1>
        <p class="text">Add your content here.</p>
    </div>

    <footer>
        <div class="container">

            </p>
